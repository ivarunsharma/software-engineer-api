spring.application.name=software-engineer-api

# Database — values read from environment variables; defaults are for local dev only
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5332/vsv}
spring.datasource.username=${DB_USERNAME:vsv}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=${SHOW_SQL:false}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
